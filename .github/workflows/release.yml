name: release

# Publishes to PyPI whenever a GitHub Release is created, or manually on demand.
#
# Setup (one time, per environment):
#   1. Create a PyPI project named "hermes-adapter" and register a Trusted Publisher
#      for this repo + the "release" GitHub Environment (recommended path).
#      Docs: https://docs.pypi.org/trusted-publishers/
#   2. Alternatively, set the PYPI_API_TOKEN secret with a scoped API token and
#      swap the `pypa/gh-action-pypi-publish` step to use `password: ${{ secrets.PYPI_API_TOKEN }}`.
#
# To cut a release:
#   1. Bump `version` in pyproject.toml + hermes_adapter/__init__.py.
#   2. Tag the commit:  git tag v0.1.0 && git push --tags
#   3. Create a GitHub Release pointing at that tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + twine check only — do not upload"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Twine check
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    # Smoke-test on TestPyPI first when the release is a pre-release,
    # or always on manual workflow_dispatch with dry_run=false.
    if: ${{ (github.event_name == 'release' && github.event.release.prerelease) || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/hermes-adapter
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hermes-adapter
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
